RPC_end_of_the_world: "End of the World"
RPC_end_of_the_world_desc: "The world’s coming to an end. All of it. Second suns have risen all across my country, turning it into cinders and ash. It’s all going downhill. And I’m seeing this union, get torn to pieces. It’s not the undead, it’s us.\n\nNow Zoe & Marley Neville are no more. I’m all alone. And I’m seeing mushroom cloud after mushroom cloud blossom like the cursed second suns that they are.\n\nWhy are you doing this, God? Why? What have we done?"

RPC_there_is_no_god: "There Is No God"
RPC_there_is_no_god_desc: "Let me tell you about this God's plan that people run their damn mouths about.\n\nThere were seven billion people on Earth in the year 2019, the year before the infection hit.\n\nX19-RZWL had a ninety-percent turn rate; that's five point four billion people turned. Bitten and then transformed into undead creatures. Zombified. Less than one percent immunity. That left twenty million uninfected.\n\nThey then started culling the uninfected, devouring us like an undead holocaust, and they fed on everybody.\n\nEverybody!\n\nEvery single person that I have ever - Zoe, Marley, the rest of the world - Ever single person that I ever known or spoken to or even looked at is DEAD!\n\nDEAD!\n\nThere is no God. There is no God."

RPC_no_more_hatred: "No More Hatred"
RPC_no_more_hatred_desc: "Bob Marley… The Elvis Presley of Reggae Music.\n\nHe had this idea. It was kind of a virologist's idea. He believed that you could cure racism and hate... literally cure it, by injecting music and love into people's lives.\n\nWhen he was scheduled to perform at a peace rally, a gunman came to his house and shot him down.\n\nTwo days later, he walked out on that stage and sang. When they asked him why, he said, The people, who were trying to make this world worse... are not taking a day off. How can I? Light up the darkness.\n\nThat’s what I oughta do. I will light up the darkness, show these fools who believe in God what is what, show them the truth - we’ve never seen him, haven’t we? For He is a fallacy made to scare."
