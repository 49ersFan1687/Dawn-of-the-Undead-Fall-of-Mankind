AEG_world_of_shit: "World of Shit"
AEG_world_of_shit_desc: "We aren’t going to sugarcoat this; we are in a world of shit. With the President infected, the country is going to hell. We have reports of uprisings across our country, and we’ve started losing contact with most generals.\n\nIt’s now up to President Pence to save the country from the undead menace. We need discipline, strength, and unity to defeat the undead."

AEG_new_tactics_for_a_new_world: "New Tactics for a New World"
AEG_new_tactics_for_a_new_world_desc: "The United States Army, while equipped with some of the most powerful weapons in the world right now, needs to learn specialized tactics to deal with the undead hordes in large numbers.\n\nCrowd Control Tactics, an increased use in Armored Vehicles against the undead, improved biohazard containment practices;\n\nAll of these will help with fighting these rotting bastards."

