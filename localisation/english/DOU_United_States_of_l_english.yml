USA_a_new_decade: "A New Decade"
USA_a_new_decade_desc: "A new decade awaits us as we leave behind the turmoil of the 2010s, ever since the election of President Donald Trump in 2016. The 2020s are now a new frontier for our country. Our glorious country will move forward.\n\nLet us enter 2020 with renewed hope that we will crush Sleepy Joe and secure a second term."

USA_a_moderate_stance: "A Modern Stance"
USA_a_moderate_stance_desc: "Seeing as how our current policies are making the racial and political tensions worse in America, along with the fact that people who oppose us, such as Democrats and moderate Republicans, are steadily gaining opposition.\n\nWe must soften our stance on the things we are against if we are to improve our standing among these groups."

