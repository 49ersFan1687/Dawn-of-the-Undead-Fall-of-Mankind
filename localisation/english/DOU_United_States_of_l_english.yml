### Events - United States of America ###
####################################

USA_cleaning_house: "Cleaning House"
USA_cleaning_house_desc: "The phone rung for a 14th time as Donald groaned. It was Dr. Russell Barnaby. It had to be him. Phone had been ringing off the hook. Donald picked it up as he put it on his right ear.\n\n“Am I speaking with President Donald Trump?” A gruff old voice crowed out from the other line.\n\n“Yes?”\n\n“What the hell are you doing, Trump?” He rasped out, as Trump cupped his left hand in disbelief, the call happening for another time.\n\n“You better start to explain why you have implicated us in the Portland Lab Leak!”\n\n“I’m cleaning house, Dr. Barnaby,” Trump said. “Something I should have done the moment Santa Cabeza happened.”\n\n“You don’t bring up Santa Cabeza. Ever. Our testing facilities in Zambia, India, Syria, Peru and Albania are being burnt to the ground by rioters. We’ve had Eugent Rudaj - that’s our guy in Albania - being under SPAK investigation. We’re sinking thanks to you. I will have your head for this.”\n\n“Listen here, clueless,” Trump snapped, pointing his finger whilst raising his voice. “Admit you can’t do your damn job. Your job was making sure nothing got out of that lab. You failed.”\n\nBarnaby chuckled. “I failed?”\n\n“And now I’m telling the world all about your backroom deals and crap you did with people - don’t think I didn’t read that Eyes Only document about those illegal human trials in Haiti. I’m exposing you, Doc.”\n\n“This is insane. You cannot do this. Do this, and you will sink, Mr. President! You will not run away from this unscathed. I know all about your relationship with Epstein. I know about you making a deal with Tel Aviv and Riyadh to strike Iran. I know it all!”\n\n“You’re sinking, Doc. You, and nobody else.”

