#####################################################

USA_situation_in_portland: "Situation in Portland"
USA_situation_in_portland_desc: "We have a developing situation in Portland, as we speak. Details are sketchy, but it appears a bomb was detonated in the Portland lab. We don’t know yet how the bomb managed to pass security, but what we do know is that the Portland lab contains thousands of viruses - Measles, Polio, Superflu, Ebola, and the most alarming - X19-RZWL."

USA_us_government_v_phenotrans_pharamaceuticals: "US Government v. Phenotrans Pharmaceuticals"
USA_us_government_v_phenotrans_pharamaceuticals_desc: "Phenotrans - World’s biggest supplier of pharamceuticals to Africa, Southeast Asia, the Middle East, South America and Eastern Europe. And now, the sole person culpable for the Portland Lab Leak.\n\nEverybody knows: Phenotrans has been using people in the Global South as test subjects, and just now its all coming to light. Phenotrans is finished, they will be buried. This also gives us the excuse of wiping out board directors who have opposed our erasure of Medicaid."

USA_shaking_mcmullens_hand: "Shaking McMullen’s Hand"
USA_us_government_v_phenotrans_pharamaceuticals_desc: "Wesker’s nuts. He’s a madman. 'Mankind must be changed if it wants to conquer the world.' He has lost his mind, and we should distance ourselves from him. Umbrella’s whole twisted nonsense will not help our cause, so much as it will damage it.\n\nOn the other hand, Raymond McMullen and Gentek are more reliable, and are not run by a psychopath alleged to have betrayed his people during Operation: Desert Storm."
