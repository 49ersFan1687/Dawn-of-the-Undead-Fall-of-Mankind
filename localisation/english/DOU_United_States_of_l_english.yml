USA_us_government_v_phenotrans_pharamaceuticals: "US Government v. Phenotrans Pharmaceuticals"
USA_us_government_v_phenotrans_pharamaceuticals_desc: "Phenotrans - World’s biggest supplier of pharamceuticals to Africa, Southeast Asia, the Middle East, South America and Eastern Europe. And now, the sole person culpable for the Portland Lab Leak.\n\nEverybody knows: Phenotrans has been using people in the Global South as test subjects, and just now its all coming to light. Phenotrans is finished, they will be buried. This also gives us the excuse of wiping out board directors who have opposed our erasure of Medicaid."
